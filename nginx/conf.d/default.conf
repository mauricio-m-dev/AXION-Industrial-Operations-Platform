# ═══════════════════════════════════════════════════════════════════════════════
# AXION — Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Em produção com Cloudflare: o SSL/TLS é terminado na borda pelo Cloudflare.
# O Nginx recebe tráfego HTTP do Cloudflare e faz proxy para o app Node.js.
# Em ambiente local: serve via HTTP na porta 80 para evitar erros de
# certificado autoassinado com Service Workers (PWA).
# ═══════════════════════════════════════════════════════════════════════════════

# Filtro rigoroso para prevenir H2C smuggling:
# Apenas permite o header "Upgrade" se o valor for exatamente "websocket".
# Se for qualquer outra coisa (como "h2c"), resolve para vazio e o header NÃO é encaminhado.
map $http_upgrade $filtered_upgrade {
    default   "";
    websocket "websocket";
}

map $filtered_upgrade $connection_upgrade {
    default   close;
    websocket upgrade;
}

# Configuração de Compressão GZIP (Otimização de Tráfego)
gzip on;
gzip_disable "msie6";
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

# Bloco HTTP — Porta 80 (Acesso principal local e via Cloudflare)
server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $filtered_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $filtered_upgrade;

        # Headers de IP real através do Cloudflare
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache agressivo para assets estáticos do Vite (JS, CSS, Imagens)
    location /assets/ {
        proxy_pass http://app:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# Bloco HTTPS — Porta 443 (Para ambientes com certificado SSL válido)
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Cloudflare Authenticated Origin Pull (Opcional, mas recomendado)
    # ssl_client_certificate /etc/nginx/ssl/cloudflare.crt;
    # ssl_verify_client on;

    ssl_protocols TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $filtered_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $filtered_upgrade;

        # Headers de IP real através do Cloudflare
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache agressivo para assets estáticos do Vite (JS, CSS, Imagens)
    location /assets/ {
        proxy_pass http://app:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
